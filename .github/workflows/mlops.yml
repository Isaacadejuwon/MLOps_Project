name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Train the ML Model
        run: |
          python train.py
        # This step automatically generates the model_dir/model.joblib file 
        # inside the GitHub runner before Docker tries to build it!

      - name: 5. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 6. Build the Docker Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Set to true later if you want to push to Docker Hub
          tags: mlops-api:latest