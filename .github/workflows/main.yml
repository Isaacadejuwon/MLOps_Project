name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main

# Grant the workflow permission to upload to the GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Train the ML Model
        run: |
          python train.py

      - name: 5. Convert GitHub Repository name to lowercase
        run: |
          echo "REPO_LC=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: 6. Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 7. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 8. Build and Push the Docker Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/mlops-api:latest